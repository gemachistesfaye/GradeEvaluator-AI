{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <h2 style="margin-bottom: 2rem;"><i class="fa-solid fa-user-plus"></i> Register</h2>
    <form method="POST" class="auth-form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn" style="width: 100%;"><i class="fa-solid fa-user-plus"></i> Register</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem;">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary);">Login here</a></p>
</div>
{% endblock %}
