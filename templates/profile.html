{% extends "base.html" %}
{% block content %}

<style>
    /* Premium Profile Card */
    .profile-card {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px;
        background: var(--bg-primary, #ffffff);
        border-radius: 24px;
        border: 1px solid var(--border, #e5e7eb);
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        text-align: center;
    }

    .avatar-large {
        width: 100px;
        height: 100px;
        background: var(--primary-light, rgba(99, 102, 241, 0.1));
        color: var(--primary, #6366f1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
        font-size: 32px;
        position: relative;
        overflow: hidden;
        border: 2px solid #ffffff;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
    }

    .avatar-large img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .avatar-upload-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.5);
        color: white;
        font-size: 10px;
        padding: 4px 0;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .avatar-large:hover .avatar-upload-overlay {
        opacity: 1;
    }

    .kpi-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 32px 0;
        background: var(--bg-secondary, #f9fafb);
        padding: 20px;
        border-radius: 16px;
    }

    .kpi-val {
        font-size: 24px;
        font-weight: 800;
        color: var(--primary, #6366f1);
    }

    .kpi-label {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--text-secondary, #6b7280);
        margin-top: 4px;
    }

    .settings-form {
        margin-top: 32px;
        padding-top: 32px;
        border-top: 1px solid var(--border, #e5e7eb);
        text-align: left;
    }

    .form-group {
        margin-bottom: 16px;
    }

    .form-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border, #e5e7eb);
        font-size: 14px;
        margin-top: 6px;
        background: var(--bg-secondary, #ffffff);
        color: var(--text-primary, #111827);
        transition: border 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary, #6366f1);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
</style>

<div class="profile-card">
    <div class="avatar-large">
        {% if user.avatar_url %}
            <img src="{{ user.avatar_url }}" alt="Profile Photo">
        {% else %}
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
        {% endif %}
        <label for="avatar-upload" class="avatar-upload-overlay">EDIT</label>
        <input type="file" id="avatar-upload" style="display: none;" accept="image/*">
    </div>
    
    <h2 style="margin: 0; font-size: 24px; color: var(--text-primary, #111827);">{{ user.name }}</h2>
    <p style="color: var(--text-secondary, #6b7280); margin-top: 8px;">
        {{ user.email }}
    </p>
    <p style="color: var(--text-secondary, #6b7280); margin-top: 8px;">
        University: {{ user.university or 'Not set' }}
    </p>
    <form method="POST" style="margin-top: 16px;">
        <div class="form-group">
            <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary, #4b5563);">Name</label>
            <input type="text" name="name" class="form-input" placeholder="{{ user.name }}" value="{{ user.name }}" />
        </div>
        <div class="form-group">
            <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary, #4b5563);">University</label>
            <input type="text" name="university" class="form-input" placeholder="{{ user.university or '' }}" value="{{ user.university }}" />
        </div>

        <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 16px;">Update Profile</button>
    </form>

    <div class="kpi-grid">
        <div>
            <div class="kpi-val">{{ user.joined_date }}</div>
            <div class="kpi-label">Account Joined</div>
        </div>
        <div>
            <div class="kpi-val">{{ grade_count }}</div>
            <div class="kpi-label">Grades Evaluated</div>
        </div>
    </div>

    <div class="settings-form">
        <h3 style="font-size: 16px; font-weight: 700; color: var(--text-primary, #111827); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Security Settings
        </h3>
        <form method="POST">
            <div class="form-group">
                <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary, #4b5563);">Current Password</label>
                <input type="password" name="current_password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary, #4b5563);">New Password</label>
                <input type="password" name="new_password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary, #4b5563);">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; justify-content: center; margin-top: 16px;">
                Update Password
            </button>
        </form>
    </div>
</div>

{% endblock %}
